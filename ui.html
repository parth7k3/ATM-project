<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Commerce Bank - ATM Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="atm-container">
        
        <header class="atm-header">
            <div class="logo">GLOBAL COMMERCE BANK</div>
            <div class="user-info">Welcome,<br><strong>ALEX JOHNSON</strong></div>
            <div class="system-status">
                <span class="time">10:45 AM | Oct 26, 2023</span>
                <div class="language-toggle">🇺🇸 English | 🇪🇸 Spanish</div>
            </div>
        </header>

        <div class="main-interface">
            
            <main class="services-grid">
                <button class="grid-btn highlight-btn">Quick Cash<br><small>$20, $40, $60, $100</small></button>
                <button class="grid-btn">Withdrawal<br><small>Amount</small></button>
                <button class="grid-btn">Deposit<br><small>Cash/Check</small></button>
                <button class="grid-btn">Balance Inquiry<br><small>Checking: $1,245.89</small></button>
                
                <button class="grid-btn">Funds Transfer<br><small>Account & External</small></button>
                <button class="grid-btn">Bill Pay<br><small>Utilities, Credit Card</small></button>
                <button class="grid-btn">Mini Statement<br><small>View History</small></button>
                <button class="grid-btn">Card Services<br><small>PIN Change/Manage</small></button>
                
                <button class="grid-btn">Loan Payments<br><small>Mortgage, Auto</small></button>
                <button class="grid-btn">Check Services<br><small>Order, Details</small></button>
                <button class="grid-btn">Investments<br><small>View Portfolio</small></button>
                <button class="grid-btn">Settings/Help<br><small>Preferences</small></button>
            </main>

            <aside class="side-panel">
                <div class="navigation-btns">
                    <button class="nav-btn back-btn">← BACK</button>
                    <button class="nav-btn cancel-btn">✕ CANCEL</button>
                </div>
                
                <div class="account-balances">
                    <div class="account">
                        <span>CHECKING ****1234</span>
                        <strong>$1,245.89</strong>
                    </div>
                    <div class="account">
                        <span>SAVINGS ****5678</span>
                        <strong>$7,890.12</strong>
                    </div>
                </div>
                
                <div class="action-btns">
                    <button class="nav-btn view-pin-btn">🔑 VIEW PIN</button>
                    <button class="nav-btn end-btn">✕ END TRANSACTION</button>
                </div>
            </aside>
            
        </div>

        <footer class="hardware-footer">
            <div class="slot">CARD READER</div>
            <div class="slot">CASH DISPENSER</div>
            <div class="slot active-slot">KEYPAD SHIELD</div>
            <div class="slot">RECEIPT</div>
        </footer>
        
    </div>
</body>
</html>
